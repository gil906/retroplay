<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RetroPlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; height: 100%; width: 100%; overflow: hidden; }
  #back-btn {
    position: fixed; top: 16px; left: 16px; z-index: 10000;
    background: rgba(10,10,20,0.7); color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 0.5rem 1.2rem; border-radius: 24px; cursor: pointer; font-size: 0.85rem;
    text-decoration: none; backdrop-filter: blur(12px);
    opacity: 0; transition: all 0.3s ease;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #back-btn.visible { opacity: 1; }
  #back-btn:hover {
    background: linear-gradient(135deg, rgba(233,69,96,0.9), rgba(214,54,79,0.9));
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(233,69,96,0.3);
  }
  #game { width: 100vw; height: 100vh; height: 100dvh; }
  /* Push virtual controls above Chrome's bottom bar on mobile (portrait) */
  @media (pointer: coarse) and (orientation: portrait) {
    #game {
      height: calc(100dvh - 40px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-sizing: border-box;
    }
  }
  /* Landscape: fill screen, account for safe areas (notch/nav bar) */
  @media (pointer: coarse) and (orientation: landscape) {
    #game {
      width: 100dvw;
      height: 100dvh;
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      box-sizing: border-box;
    }
    /* Move EmulatorJS floating menu buttons out of the game center */
    div[id="game"] :is([class*="menu"], [class*="bar"], [style*="bottom"]) {
      opacity: 0.4;
    }
  }
  #loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0a14;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.2rem;
    transition: opacity 0.8s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader-spinner {
    width: 56px; height: 56px;
    border: 3px solid rgba(233,69,96,0.15);
    border-top-color: #e94560;
    border-right-color: #6c5ce7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    box-shadow: 0 0 20px rgba(233,69,96,0.3), inset 0 0 20px rgba(108,92,231,0.1);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-game {
    color: #fff; font-family: 'Inter', system-ui, sans-serif;
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, #e94560, #ff6b6b, #6c5ce7);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textGradient 3s ease infinite;
  }
  @keyframes textGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .loader-text {
    color: #666; font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.85rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .loader-scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    z-index: 1;
  }
  .loader-dots {
    display: flex; gap: 6px;
    margin-top: 0.5rem;
  }
  .loader-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #e94560;
    animation: dotBounce 1.4s ease-in-out infinite;
  }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
  #error-screen {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.2rem;
    font-family: 'Inter', system-ui, sans-serif;
  }
  #error-screen.show { display: flex; }
  #error-screen h2 {
    color: #e94560; font-size: 1.8rem; font-weight: 800;
    text-shadow: 0 0 20px rgba(233,69,96,0.3);
  }
  #error-screen p {
    color: #888; max-width: 450px; text-align: center;
    line-height: 1.6;
  }
  #error-screen a {
    color: #fff; text-decoration: none;
    background: linear-gradient(135deg, #e94560, #d6364f);
    padding: 0.7rem 2rem; border-radius: 12px;
    font-weight: 700; font-size: 0.95rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(233,69,96,0.3);
  }
  #error-screen a:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(233,69,96,0.4);
  }
  #crt-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 10000;
    background: rgba(10,10,20,0.7); color: #888;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 0.5rem 1rem; border-radius: 24px; cursor: pointer;
    font-size: 0.8rem; font-family: 'Inter', system-ui, sans-serif; font-weight: 600;
    backdrop-filter: blur(12px);
    opacity: 0; transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #crt-toggle.visible { opacity: 1; }
  #crt-toggle:hover { color: #fff; background: rgba(108,92,231,0.7); }
  #crt-toggle.active { color: #fff; background: rgba(108,92,231,0.8); border-color: rgba(108,92,231,0.5); }
  .crt-overlay {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    display: none;
  }
  .crt-overlay.active { display: block; }
  .crt-overlay::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 1px,
      rgba(0,0,0,0.08) 1px,
      rgba(0,0,0,0.08) 2px
    );
  }
  .crt-overlay::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.15) 100%);
  }
</style>
</head>
<body>
<a id="back-btn" href="/">🏠 Library</a>
<button id="crt-toggle">📺 CRT</button>
<div class="crt-overlay" id="crt-overlay"></div>

<div id="loading-overlay">
  <div class="loader-scanlines"></div>
  <div class="loader-spinner"></div>
  <div class="loader-game" id="loading-name">Loading...</div>
  <div class="loader-text">Preparing emulator...</div>
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<div id="error-screen">
  <div style="font-size:4rem;margin-bottom:0.5rem;">💀</div>
  <h2>Game Over</h2>
  <p id="error-msg">The ROM file could not be found or loaded. Check your cartridge and try again.</p>
  <a href="/">← Return to Library</a>
</div>

<div id="game"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const system = params.get('system');
  const core = params.get('core');
  const romFile = params.get('rom');

  if (!system || !core || !romFile) {
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('error-screen').classList.add('show');
    document.getElementById('error-msg').textContent = 'Missing game parameters.';
  } else {
    const gameName = romFile.replace(/\.[^.]+$/, '').replace(/\s*[\(\[][^\)\]]*[\)\]]\s*/g, '').trim();
    document.title = 'RetroPlay — ' + gameName;
    document.getElementById('loading-name').textContent = gameName;

    // Verify the ROM exists before loading EmulatorJS
    const romUrl = '/roms/' + system + '/' + encodeURIComponent(romFile);
    fetch(romUrl, { method: 'HEAD' }).then(res => {
      if (!res.ok) {
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('error-screen').classList.add('show');
        document.getElementById('error-msg').textContent = 'ROM file not found: ' + romFile;
        return;
      }

      // Detect mobile/touch devices
      var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window);

      // EmulatorJS configuration
      window.EJS_player = '#game';
      window.EJS_gameUrl = romUrl;
      window.EJS_core = core;
      window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
      window.EJS_gameName = gameName;
      window.EJS_color = '#e94560';
      window.EJS_startOnLoaded = true;
      window.EJS_fullscreenOnLoaded = false;

      // Disable WASM threads on mobile if SharedArrayBuffer is unavailable
      if (typeof SharedArrayBuffer === 'undefined') {
        window.EJS_threads = false;
      }

      // Netplay (LAN multiplayer)
      window.EJS_netplayServer = window.location.origin;
      // Generate a consistent game ID from the ROM filename
      window.EJS_gameID = Array.from(romFile).reduce(function(h, c) { return ((h << 5) - h + c.charCodeAt(0)) | 0; }, 0);
      // ICE servers: STUN only initially, TURN added after fetching temp credentials
      var turnHost = window.location.hostname;
      window.EJS_netplayICEServers = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ];
      // Fetch temporary TURN credentials (not hardcoded)
      fetch('/api/turn-credentials').then(function(r) { return r.json(); }).then(function(creds) {
        window.EJS_netplayICEServers.push({
          urls: 'turn:' + turnHost + ':3478',
          username: creds.username,
          credential: creds.credential
        });
      }).catch(function() {});

      // Per-user save data: override save/load URLs with auth token
      var authToken = localStorage.getItem('retroplay_token');
      var saveHeaders = authToken ? { 'Authorization': 'Bearer ' + authToken } : {};

      window.EJS_onSaveState = function(e) {
        var saveData = e.state;
        fetch('/api/saves/' + system + '/' + encodeURIComponent(romFile) + '.state', {
          method: 'PUT',
          headers: Object.assign({ 'Content-Type': 'application/octet-stream' }, saveHeaders),
          body: saveData
        }).catch(function(){});
      };

      window.EJS_onLoadState = function(e) {
        // EmulatorJS handles this via the save URL
      };

      // Set save state URL (EmulatorJS auto-loads from this on start)
      window.EJS_gameSaveUrl = '/api/saves/' + system + '/' + encodeURIComponent(romFile) + '.state';

      // Patch fetch for save URLs to include auth header
      if (authToken) {
        var origFetch = window.fetch;
        window.fetch = function(url, opts) {
          if (typeof url === 'string' && url.includes('/api/saves/')) {
            opts = opts || {};
            opts.headers = Object.assign({}, opts.headers, { 'Authorization': 'Bearer ' + authToken });
          }
          return origFetch.call(this, url, opts);
        };
      }

      // Hide loading overlay once EmulatorJS takes over
      window.EJS_onGameStart = function() {
        document.getElementById('loading-overlay').classList.add('hidden');
        // In landscape, reposition EmulatorJS virtual gamepad center buttons
        // (Start, Select, Slow, Fast) so they don't overlap the game screen.
        fixLandscapeControls();
      };

      function fixLandscapeControls() {
        if (!isMobile) return;
        var style = document.createElement('style');
        style.textContent =
          // Target EmulatorJS bottom-center control bar in landscape
          '@media (orientation: landscape) {' +
          '  [data-btn="start"], [data-btn="select"],' +
          '  [data-btn="quicksave"], [data-btn="quickload"],' +
          '  [data-btn="slow"], [data-btn="fast"] {' +
          '    transform: scale(0.65) !important;' +
          '    opacity: 0.35 !important;' +
          '  }' +
          '}';
        document.head.appendChild(style);
      }

      // Load EmulatorJS
      const script = document.createElement('script');
      script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
      script.onerror = function() {
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('error-screen').classList.add('show');
        document.getElementById('error-msg').textContent = 'Failed to load EmulatorJS from CDN.';
      };
      document.body.appendChild(script);

      // Fallback: hide loading after 15s even if onGameStart doesn't fire
      setTimeout(function() {
        document.getElementById('loading-overlay').classList.add('hidden');
      }, 15000);
    }).catch(function() {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('error-screen').classList.add('show');
      document.getElementById('error-msg').textContent = 'Network error checking ROM file.';
    });
  }

  // Back button: show on mouse/touch activity, hide after 2s idle
  let hideTimer;
  const backBtn = document.getElementById('back-btn');
  function showBackBtn() {
    backBtn.classList.add('visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() { backBtn.classList.remove('visible'); }, 2000);
  }
  document.addEventListener('mousemove', showBackBtn);
  document.addEventListener('touchstart', showBackBtn, { passive: true });

  // CRT scanline toggle
  const crtToggle = document.getElementById('crt-toggle');
  const crtOverlay = document.getElementById('crt-overlay');
  const crtEnabled = localStorage.getItem('retroplay_crt') === 'true';
  if (crtEnabled) { crtOverlay.classList.add('active'); crtToggle.classList.add('active'); }

  crtToggle.addEventListener('click', function() {
    const isActive = crtOverlay.classList.toggle('active');
    this.classList.toggle('active', isActive);
    localStorage.setItem('retroplay_crt', isActive);
  });

  // Show CRT toggle on mouse activity (same as back button)
  function showCrtToggle() {
    crtToggle.classList.add('visible');
    clearTimeout(crtHideTimer);
    crtHideTimer = setTimeout(function() { crtToggle.classList.remove('visible'); }, 2000);
  }
  let crtHideTimer;
  document.addEventListener('mousemove', showCrtToggle);
  document.addEventListener('touchstart', showCrtToggle, { passive: true });

  // Track this game as recently played
  if (system && romFile) {
    try {
      var trackName = romFile.replace(/\.[^.]+$/, '').replace(/\s*[\(\[][^\)\]]*[\)\]]\s*/g, '').trim();
      let recent = JSON.parse(localStorage.getItem('retroplay_recent') || '[]');
      recent = recent.filter(r => !(r.system === system && r.file === romFile));
      recent.unshift({ system, core, file: romFile, name: trackName, cover: null, time: Date.now() });
      if (recent.length > 20) recent = recent.slice(0, 20);
      localStorage.setItem('retroplay_recent', JSON.stringify(recent));
    } catch(e) {}
  }
</script>
</body>
</html>
